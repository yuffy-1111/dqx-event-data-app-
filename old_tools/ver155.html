<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0}

[style*="border:1px solid #b3d9ff"],

/* ========== ダークモード定義 ========== */

body.dark-mode #timer-row{background:#2a2f45!important}
body.dark-mode label{color:#e8e8f0!important}
body.dark-mode .b1{background:#1a6eaa!important;color:#fff!important;border:1px solid #3399cc!important}
body.dark-mode .b2{background:#aa3333!important;color:#fff!important;border:1px solid #cc5555!important}
body.dark-mode .b3{background:#1a77aa!important;color:#fff!important;border:1px solid #3399cc!important}
body.dark-mode .b4{background:#2a1515!important;border:1px solid #883333!important;color:#cc7777!important}
body.dark-mode .b5{background:#1a8899!important;color:#fff!important;border:1px solid #33aabb!important}

/* 枠線 - ダークモード時も薄めの青 */
body.dark-mode #ms, body.dark-mode #pb, body.dark-mode #cn,
body.dark-mode .rs, body.dark-mode .cs {
    border-color: #7ab8ff !important;
}

/* f0f7ff背景の要素をダークモード対応 */
body.dark-mode [style*="background: #f0f7ff"],
body.dark-mode [style*="background:#f0f7ff"],
body.dark-mode #ms {
    background-color: #2a2f45 !important;
}

/* ネオン青の文字色を維持 */
body.dark-mode #ms,
body.dark-mode #ce,
body.dark-mode #pob div {
    color: #5a9eff !important;
}

<p>
<script>
(function(){
const L=["","A","B","C","D","E","F","G","H","I","J","K","L"];
const RX={none:0,mk:48240,hm:12060,gn:2240,sn:1120,zucchini:9010};
const LV=1589326;
const $=id=>document.getElementById(id);
let T=null,st=0,ps=0,lm=0,jobOff=0,passOff=0,cnt=0,opt=1,calcLockedUntil=0;

const ft=s=>{if(isNaN(s)||s<0||s===1/0)return"00:00.00";let m=Math.floor(s/60),ss=(s%60).toFixed(2).padStart(5,"0");return`${m.toString().padStart(2,"0")}:${ss}`;};
const upT=s=>{$("td").textContent=ft(s);$("ld").textContent=ft(s-lm);let sync=Math.max(0,s-jobOff);$("syncDisplay").innerHTML=sync>0?`オプション持続: ${ft(sync)}`:"&nbsp;";};

const getRate=()=>{let r=1.0;if($("fd").checked)r+=0.3;const e=document.querySelector('input[name="e"]:checked')?.value||"none";if(e==="genki")r+=1;if(e==="bakushin")r+=2;if($("tr").checked)r+=1;if($("em").checked)r+=1;return r;};

const applyLimit=(val,lim)=>{
  let rnd=Math.round(val),isInt=Math.abs(val-rnd)<0.1;
  let rounded=$("fd").checked&&isInt?rnd+1:Math.ceil(val);
  return Math.min(rounded,lim);
};

const exp=(c,rk="none")=>{
  const sel=$("ms").options[$("ms").selectedIndex];
  const b=parseInt(sel.dataset.base)||0;
  const bon=parseInt(sel.dataset.bonus)||0;
  const rate=getRate();
  const rkVal=RX[rk]||0;
  const isAngel=$("ag").checked;
  const pv=parseInt($("pb").value)||0;
  const hasPassbook=pv>0;
  const isHighLimit=(document.querySelector('input[name="e"]:checked')?.value==="bakushin")||$("tr").checked;
  const lim=isHighLimit?1499999:599999;
  const angelLim=599999;
  let rawCommonPer=b*rate+bon;
  let rawAngelPer=isAngel?b*2:0;
  let rawRkCommon=rkVal*rate;
  let rawRkAngel=isAngel?rkVal*2:0;
  let rawTotalCommon=rawCommonPer*c+rawRkCommon;
  let rawTotalAngel=rawAngelPer*c+rawRkAngel;
  let rawTotal=rawTotalCommon+rawTotalAngel;
  if(hasPassbook){
    let commonPart=Math.min(rawTotalCommon,lim);
    let angelPart=Math.min(rawTotalAngel,angelLim);
    let totalOverflow=(rawTotalCommon-commonPart)+(rawTotalAngel-angelPart);
    let common=applyLimit(commonPart,lim);
    let angel=Math.min(Math.ceil(angelPart),angelLim);
    return{total:common+angel,common:common,angel:angel,overflow:Math.ceil(totalOverflow),rawTotalCapped:commonPart+angelPart,rawCommonCapped:commonPart,rawAngelCapped:angelPart};
  }else{
    let finalTotal=Math.min(rawTotal,lim);
    let total=applyLimit(finalTotal,lim);
    return{total:total,common:total,angel:0,overflow:Math.ceil(rawTotal-finalTotal),rawTotalCapped:finalTotal,rawCommonCapped:finalTotal,rawAngelCapped:0};
  }
};

const calcOpt=()=>{let en=document.querySelector('input[name="e"]:checked')?.value||"none",hl=en==="bakushin"||$("tr").checked,lim=hl?1499999:599999;opt=1;for(let i=1;i<=12;i++)if(exp(i).common<lim)opt=i;else break;};
const upUI=(auto=false)=>{
  let pl=parseInt($("pb").value)||0;
  const passArea=$("passbookArea");
  if(pl>0){passArea.classList.remove("hidden");$("plt").textContent=pl.toLocaleString();}
  else passArea.classList.add("hidden");
  calcOpt();
  if(auto)$("cn").value=opt;
  let c=parseInt($("cn").value),e=exp(c);
  $("ce").textContent=e.total.toLocaleString();
  $("of").style.visibility=e.overflow>0?"visible":"hidden";
  $("of").textContent=`溢れ:${e.overflow.toLocaleString()}`;
};

const upSt=()=>{
  let sumVal=0,accVal=0,lps=[],penaltyMin=0,penaltyMax=0;
  Array.from(document.querySelectorAll(".h")).reverse().forEach(i=>{
    let val=parseInt(i.dataset.val)||0;
    if(!isNaN(val)){sumVal+=val;if(i.dataset.type==="pass")accVal+=val;}
    if(i.dataset.lap&&i.dataset.lap!='-1'&&i.dataset.type!=="lap_only"&&i.dataset.type!=="job"&&i.dataset.main==="true")lps.push(parseFloat(i.dataset.lap));
    if(i.dataset.desp==="true"&&i.dataset.lap&&i.dataset.lap!='-1'&&i.dataset.type!=="lap_only"&&i.dataset.type!=="job"){
      let expVal=parseFloat(i.dataset.rawValCapped)||parseInt(i.dataset.val)||0;
      let lapSec=parseFloat(i.dataset.lap);
      if(lapSec>6.45){penaltyMin+=expVal*(6.45/lapSec);penaltyMax+=expVal*(2.58/lapSec);}
    }
  });
  $("hs").textContent=Math.ceil(sumVal).toLocaleString();
  let pl=parseInt($("pb").value)||0;
  if(pl>0){let disp=Math.max(0,accVal-passOff);$("te").textContent=Math.ceil(disp).toLocaleString();}
  let hasPenalty=document.querySelectorAll('.h[data-desp="true"]').length>0;
  const penaltyRef=$("penaltyRef");
  if(hasPenalty&&penaltyMin>0){penaltyRef.style.display="block";penaltyRef.innerHTML=`デスペナ想定:<br>${Math.ceil(penaltyMax).toLocaleString()}～${Math.ceil(penaltyMin).toLocaleString()}`;}
  else penaltyRef.style.display="none";
  if(lps.length>0){
    let avg=lps.reduce((a,b)=>a+b,0)/lps.length;
    $("at").textContent=ft(avg);
    if(avg>0.01){let b30=Math.floor(1800/avg),ep=sumVal/(lps.length||1);$("fc").textContent=`${Math.round(ep*b30/1e4)}万～${Math.round(ep*(b30+1)/1e4)}万`;}
    else $("fc").textContent="--";
  }else{$("at").textContent="--:--.--";$("fc").textContent="--";}
};

const getPartnerOptions=(mid)=>{const base=`<option value="none">お供無</option><option value="hm">はぐメタ</option><option value="mk">メタキン</option><option value="gn">ゲノミー</option><option value="sn">仙人</option>`;return mid==="dearthlicant"?base+`<option value="zucchini">ズッキ祖</option>`:base;};

const addRow=(bid,c,xp,typ,ts,lap,main=false,rawValCapped=null,mid=null,desp=false)=>{
  let d=document.createElement("div");
  d.className="h";
  d.dataset.val=xp;
  d.dataset.rawValCapped=rawValCapped!==null?rawValCapped:xp;
  const snapshot={fd:$("fd").checked,tr:$("tr").checked,ag:$("ag").checked,em:$("em").checked,e:document.querySelector('input[name="e"]:checked')?.value||"none",pb:$("pb").value,ms:mid||$("ms").value};
  d.dataset.snapshot=JSON.stringify(snapshot);
  d.dataset.type=typ;d.dataset.sec=ts;d.dataset.lap=lap!=null?lap:-1;d.dataset.main=main;d.dataset.count=c;d.dataset.bid=bid;d.dataset.monsterId=mid||$("ms").value;d.dataset.desp=desp?"true":"false";
  let tm={pass:"[通]",angel:"[エ]",overflow:"[溢]",normal:"",lap_only:"[LAP]",job:"転職"},cm={pass:"#f88",angel:"#5a9eff",overflow:"#aaa",lap_only:"#2cc9ff",job:"#00bcd4"};
  let nl=bid==="LAP"?`<span style="color:#2cc9ff;font-weight:bold;width:26px;font-size:10px">LAP</span>`:`<span style="color:#999;width:26px;font-size:10px">#${bid}</span>`;
  let tdEl=`<div style="font-family:'Verdana',system-ui,sans-serif;font-variant-numeric:tabular-nums;width:65px"><div style="font-size:11px;font-weight:bold">${ft(ts)}</div>${lap!=null&&lap>=0?`<div style="color:#2cc9ff;font-size:10px">L ${ft(lap)}</div>`:""}</div>`;
  let ea=bid==="LAP"?`<div style="width:95px;color:#aaa;font-size:10px">LAP MARK</div>`:typ==="job"?`<div style="width:95px"><span style="color:${cm[typ]};font-size:10px">${tm[typ]}</span></div>`:`<div style="width:95px"><strong class="ev" style="font-size:13px;min-width:62px;text-align:right;font-family:'Verdana',system-ui,sans-serif;font-variant-numeric:tabular-nums">${xp.toLocaleString()}</strong><span style="color:${cm[typ]};font-size:10px">${tm[typ]}</span></div>`;
  let despHtml=`<label style="margin:0 2px;display:inline-flex;align-items:center"><input type="checkbox" class="desp-tgl" ${desp?"checked":""}><span style="font-size:9px">💀</span></label>`;
  let ca=bid!=="LAP"&&typ!=="job"?`<div style="display:flex;gap:3px;flex:1"><select class="rs" style="font-size:12px;border:1px solid #7ab8ff;border-radius:2px;padding:3px">${getPartnerOptions(d.dataset.monsterId)}</select><select class="cs" style="font-size:12px;border:1px solid #7ab8ff;border-radius:2px;padding:3px">${L.map((l,i)=>i>0?`<option value="${i}" ${i==c?"selected":""}>${l}</option>`:"").join("")}</select></div>`:`<div style="flex:1;color:#aaa;text-align:center;font-size:10px">----------</div>`;
  d.innerHTML=nl+tdEl+ea+despHtml+`<button class="del" style="border:none;background:none;color:#aaa;cursor:pointer;font-size:19px;padding:0 4px">×</button>`+ca;
  if(bid!=="LAP"&&typ!=="job"){
    let upd=()=>{
      let snap=JSON.parse(d.dataset.snapshot);
      let origFd=$("fd").checked,origTr=$("tr").checked,origAg=$("ag").checked,origEm=$("em").checked,origE=document.querySelector('input[name="e"]:checked')?.value,origPb=$("pb").value,origMs=$("ms").value;
      $("fd").checked=snap.fd;$("tr").checked=snap.tr;$("ag").checked=snap.ag;$("em").checked=snap.em;
      let eRadio=document.querySelector(`input[name="e"][value="${snap.e}"]`);if(eRadio)eRadio.checked=true;
      $("pb").value=snap.pb;$("ms").value=snap.ms;
      let nc=parseInt(d.querySelector(".cs").value),nr=d.querySelector(".rs").value;
      d.dataset.count=nc;
      let res=exp(nc,nr);
      let nv=d.dataset.type==="angel"?res.angel:d.dataset.type==="pass"?res.common:res.total;
      d.dataset.val=nv;d.dataset.rawValCapped=nv;d.querySelector(".ev").textContent=nv.toLocaleString();
      $("fd").checked=origFd;$("tr").checked=origTr;$("ag").checked=origAg;$("em").checked=origEm;
      let origERadio=document.querySelector(`input[name="e"][value="${origE}"]`);if(origERadio)origERadio.checked=true;
      $("pb").value=origPb;$("ms").value=origMs;
      upSt();
    };
    d.querySelector(".cs").onchange=upd;d.querySelector(".rs").onchange=upd;
    let despChk=d.querySelector(".desp-tgl");
    if(despChk)despChk.onchange=()=>{d.dataset.desp=despChk.checked?"true":"false";upSt();};
  }
  d.querySelector(".del").onclick=()=>{d.remove();upSt();};
  $("rh").prepend(d);upSt();
};

$("calc").onclick=()=>{
  if(Date.now()<calcLockedUntil||$("calc").disabled)return;
  cnt++;
  let now=T?(Date.now()-st)/1e3:ps;
  let lap=T?(now-lm):null;
  let c=parseInt($("cn").value),res=exp(c),pl=parseInt($("pb").value)||0;
  if(pl>0){
    if(res.angel>0)addRow(cnt,c,res.angel,"angel",now,lap,false,res.angel,null,false);
    let accRaw=0;
    document.querySelectorAll('.h[data-type="pass"]').forEach(i=>{let r=parseFloat(i.dataset.rawValCapped);if(!isNaN(r))accRaw+=r;});
    let remRaw=Math.max(0,pl-(accRaw-passOff)),rem=Math.ceil(remRaw);
    if(rem>=res.common)addRow(cnt,c,res.common,"pass",now,lap,true,res.common,null,false);
    else if(rem>0){addRow(cnt,c,res.common-rem,"overflow",now,lap,false,res.common-rem,null,false);addRow(cnt,c,rem,"pass",now,lap,true,rem,null,false);}
    else addRow(cnt,c,res.common,"overflow",now,lap,true,res.common,null,false);
  }else addRow(cnt,c,res.total,"normal",now,lap,true,res.total,null,false);
  lm=now;upT(now);
  calcLockedUntil=Date.now()+3000;
  let btn=$("calc");btn.disabled=true;btn.style.opacity="0.5";
  let cb=3,iv=setInterval(()=>{--cb>0?btn.textContent=`(${cb})`:(clearInterval(iv),btn.disabled=false,btn.style.opacity="1",btn.textContent="加算",upUI())},1e3);
};

$("ra").onclick=()=>{if(T){clearInterval(T);T=null}ps=0;st=0;lm=0;cnt=0;jobOff=0;passOff=0;$("rh").innerHTML="";upT(0);upSt();upUI()};
$("ml").onclick=()=>{let accRaw=0;document.querySelectorAll('.h[data-type="pass"]').forEach(i=>{let r=parseFloat(i.dataset.rawValCapped);if(!isNaN(r))accRaw+=r;});let bal=accRaw-passOff;if(bal<=0)return;let wd=Math.min(LV,bal);passOff+=wd;upSt();};
$("lp").onclick=()=>{let now=T?(Date.now()-st)/1e3:ps;addRow("LAP",0,0,"lap_only",now,now-lm);lm=now;upT(now);};
$("job").onclick=()=>{if(!T&&ps===0)return;let now=T?(Date.now()-st)/1e3:ps;jobOff+=20;if(jobOff>now)jobOff=now;upT(now);if(T){addRow("JOB",0,0,"job",now,now-lm);lm=now;}};
$("pob").onclick=()=>{$("cn").value=Math.min(12,opt+1);upUI(false);};
$("ts").onclick=()=>{if(!T){st=Date.now()-ps*1e3;T=setInterval(()=>upT((Date.now()-st)/1e3),30);calcLockedUntil=Math.max(calcLockedUntil,Date.now())+100;$("calc").disabled=true;$("calc").style.opacity="0.5";setTimeout(()=>{if(Date.now()>=calcLockedUntil){$("calc").disabled=false;$("calc").style.opacity="1";}},100);}};
$("tsp").onclick=()=>{if(T){clearInterval(T);T=null;ps=(Date.now()-st)/1e3;upT(ps);}};
$("pr").onclick=()=>{let accRaw=0;document.querySelectorAll('.h[data-type="pass"]').forEach(i=>{let r=parseFloat(i.dataset.rawValCapped);if(!isNaN(r))accRaw+=r;});passOff=Math.ceil(accRaw);upSt();};

$("copyHistory").onclick=()=>{
  try{
    let lines=[];
    lines.push(`モンスター/${$("ms").options[$("ms").selectedIndex].text}`);
    lines.push(`総獲得/平均タイム/想定玉給`);
    lines.push(`${$("hs").textContent.replace(/,/g, '')}/${$("at").textContent}/${$("fc").textContent}`);
    lines.push(``);
    lines.push(`#/戦闘時間/獲得exp/呼び数/お供/種類`);

    document.querySelectorAll(".h").forEach(el=>{
      let type=el.dataset.type||"";
      let bid=el.dataset.bid||"-";

      if(type==="lap_only"){
        lines.push(`${bid}/LAPMARK////`);
        return;
      }

      if(type==="job"){
        let time=ft(parseFloat(el.dataset.sec)||0);
        lines.push(`${bid}/${time}////転職`);
        return;
      }

      let time=ft(parseFloat(el.dataset.sec)||0);
      let expVal=parseInt(el.dataset.val)||0;
      let exp=expVal.toLocaleString().replace(/,/g, '');

      let count=parseInt(el.dataset.count);
      let call=!isNaN(count)?(L[count]||"--"):"--";

      let partner="お供無";
      let rs=el.querySelector(".rs");
      if(rs) partner=rs.options[rs.selectedIndex]?.text||"お供無";

      let tname=
        type==="pass"?"通帳":
        type==="angel"?"エンゼル":
        type==="overflow"?"溢れ":
        "通常";

      lines.push(`${bid}/${time}/${exp}/${call}/${partner}/${tname}`);
    });

    let text=lines.join("\n");
    navigator.clipboard.writeText(text)
      .then(()=>alert("履歴をコピーしました"))
      .catch(err=>{
        console.error(err);
        alert("コピー失敗（環境制限の可能性あり）");
      });
  }catch(e){
    console.error(e);
    alert("コピー処理でエラー発生");
  }
};

document.querySelectorAll('input[name="e"],#fd,#tr,#ag,#em,#ms,#pb').forEach(i=>i.onchange=()=>upUI(true));
$("cn").onchange=()=>upUI(false);
upUI(true);
})();
</script>
