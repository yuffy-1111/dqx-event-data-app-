const getRate = () => {
  let rate = 1.0;
  if ($("fd").checked) rate += 0.3;
  const e = document.querySelector('input[name="e"]:checked')?.value || "none";
  if (e === "genki") rate += 1.0;
  if (e === "bakushin") rate += 2.0;
  if ($("tr").checked) rate += 1.0;
  if ($("em").checked) rate += 1.0;
  return rate;

const applyLimit = (val, lim) => {
  let rounded;
  const roundedVal = Math.round(val);
  const isEffectivelyInteger = Math.abs(val - roundedVal) < 0.1;
  if ($("fd").checked && isEffectivelyInteger) {
    rounded = roundedVal + 1;
  } else {
    rounded = Math.ceil(val);
  }
  return Math.min(rounded, lim);
};

const exp = (c, rk = "none") => {
  const sel = $("ms").options[$("ms").selectedIndex];
  const b = parseInt(sel.dataset.base) || 0;
  const bon = parseInt(sel.dataset.bonus) || 0;
  const rate = getRate();
  const rkVal = RX[rk] || 0;
  const isAngel = $("ag").checked;
  const pv = parseInt($("pb").value) || 0;
  const hasPassbook = pv > 0;
  const isHighLimit = (document.querySelector('input[name="e"]:checked')?.value === "bakushin") || $("tr").checked;
  const lim = isHighLimit ? 1499999 : 599999;
  const angelLim = 599999;

  let rawCommonPer = b * rate + bon;
  let rawAngelPer = isAngel ? b * 2 : 0;
  let rawRkCommon = rkVal * rate;
  let rawRkAngel = isAngel ? rkVal * 2 : 0;

  let rawTotalCommon = rawCommonPer * c + rawRkCommon;
  let rawTotalAngel = rawAngelPer * c + rawRkAngel;
  let rawTotal = rawTotalCommon + rawTotalAngel;

  if (hasPassbook) {
    let commonPart = Math.min(rawTotalCommon, lim);
    let angelPart = Math.min(rawTotalAngel, angelLim);
    let totalOverflow = (rawTotalCommon - commonPart) + (rawTotalAngel - angelPart);
    let common = applyLimit(commonPart, lim);
    let angel = Math.min(Math.ceil(angelPart), angelLim);
    return {
      total: common + angel,
      common: common,
      angel: angel,
      overflow: Math.ceil(totalOverflow),
      rawTotalCapped: commonPart + angelPart,
      rawCommonCapped: commonPart,
      rawAngelCapped: angelPart

  } else {
    let finalTotal = Math.min(rawTotal, lim);
    let total = applyLimit(finalTotal, lim);
    return {
      total: total,
      common: total,
      angel: 0,
      overflow: Math.ceil(rawTotal - finalTotal),
      rawTotalCapped: finalTotal,
      rawCommonCapped: finalTotal,
      rawAngelCapped: 0
    };
  }
};

const calcOpt=()=>{let en=document.querySelector('input[name="e"]:checked')?.value||"none",hl=en==="bakushin"||$("tr").checked,lim=hl?1499999:599999;opt=1;for(let i=1;i<=12;i++)if(exp(i).common<lim)opt=i;else break;};
const upUI=(auto=false)=>{let pl=parseInt($("pb").value)||0;$("ta").style.display=pl>0?"block":"none";$("plt").textContent=pl.toLocaleString();calcOpt();if(auto)$("cn").value=opt;let c=parseInt($("cn").value),e=exp(c);$("ce").textContent=e.total.toLocaleString();$("of").style.visibility=e.overflow>0?"visible":"hidden";$("of").textContent=`溢れ:${e.overflow.toLocaleString()}`;};
const upSt=()=>{let sumRaw=0,accRaw=0,lps=[];Array.from(document.querySelectorAll(".h")).reverse().forEach(i=>{let raw=parseFloat(i.dataset.rawValCapped);if(!isNaN(raw)){sumRaw+=raw;if(i.dataset.type==="pass")accRaw+=raw;}if(i.dataset.lap&&i.dataset.lap!='-1'&&i.dataset.type!=="lap_only"&&i.dataset.type!=="job"&&i.dataset.main==="true")lps.push(parseFloat(i.dataset.lap));});let sum=Math.ceil(sumRaw);let acc=Math.ceil(accRaw);if(lps.length>0){let avg=lps.reduce((a,b)=>a+b,0)/lps.length;$("at").textContent=ft(avg);if(avg>0.01){let b30=Math.floor(1800/avg),ep=sum/(lps.length||1);$("fc").textContent=`${Math.round(ep*b30/1e4)}万～${Math.round(ep*(b30+1)/1e4)}万`;}else $("fc").textContent="--";}else{$("at").textContent="--:--.--";$("fc").textContent="--";}$("hs").textContent=sum.toLocaleString();let pl=parseInt($("pb").value)||0;if(pl>0){let disp=Math.max(0,acc-passOff);$("te").textContent=Math.ceil(disp).toLocaleString();}};const addRow=(bid,c,xp,typ,ts,lap,main=!1,rawValCapped=null)=>{let d=document.createElement("div");d.className="h";d.dataset.val=xp;d.dataset.rawValCapped=rawValCapped!==null?rawValCapped:xp;d.dataset.type=typ;d.dataset.sec=ts;d.dataset.lap=lap!=null?lap:-1;d.dataset.main=main;d.dataset.count=c;d.dataset.bid=bid;let tm={pass:"[通]",angel:"[エ]",overflow:"[溢]",normal:"",lap_only:"[LAP]",job:"転職"},cm={pass:"#f88",angel:"#5a9eff",overflow:"#aaa",lap_only:"#2cc9ff",job:"#00bcd4"};let nl=bid==="LAP"?`<span style="color:#2cc9ff;font-weight:bold;width:26px;font-size:10px">LAP</span>`:`<span style="color:#999;width:26px;font-size:10px">#${bid}</span>`;let td=`<div style="font-family:'Verdana',system-ui,sans-serif;font-variant-numeric:tabular-nums;width:65px"><div style="font-size:11px;font-weight:bold">${ft(ts)}</div>${lap!=null&&lap>=0?`<div style="color:#2cc9ff;font-size:10px">L ${ft(lap)}</div>`:""}</div>`;let ea=bid==="LAP"?`<div style="width:95px;color:#aaa;font-size:10px">LAP MARK</div>`:typ==="job"?`<div style="width:95px"><span style="color:${cm[typ]};font-size:10px">${tm[typ]}</span></div>`:`<div style="width:95px"><strong class="ev" style="font-size:13px;min-width:62px;text-align:right;font-family:'Verdana',system-ui,sans-serif;font-variant-numeric:tabular-nums">${xp.toLocaleString()}</strong><span style="color:${cm[typ]};font-size:10px">${tm[typ]}</span></div>`;let ca=bid!=="LAP"&&typ!=="job"?`<div style="display:flex;gap:3px;flex:1"><select class="rs" style="font-size:12px;border:1px solid #ccc;border-radius:2px;padding:3px"><option value="none">お供無</option><option value="hm">はぐメタ</option><option value="mk">メタキン</option><option value="gn">ゲノミー</option><option value="sn">仙人</option></select><select class="cs" style="font-size:12px;border:1px solid #06c;border-radius:2px;padding:3px">${L.map((l,i)=>i>0?`<option value="${i}" ${i==c?"selected":""}>${l}</option>`:"").join("")}</select></div>`:`<div style="flex:1;color:#aaa;text-align:center;font-size:10px">----------</div>`;d.innerHTML=nl+td+ea+`<button class="del" style="border:none;background:none;color:#aaa;cursor:pointer;font-size:19px;padding:0 4px">×</button>`+ca;if(bid!=="LAP"&&typ!=="job"){let upd=()=>{let nc=parseInt(d.querySelector(".cs").value),nr=d.querySelector(".rs").value;d.dataset.count=nc;let res=exp(nc,nr),nv=0;if(d.dataset.type==="angel"){nv=res.angel;}else if(d.dataset.type==="pass"){nv=res.common;}else{nv=res.total;}d.dataset.val=nv;d.dataset.rawValCapped=nv;d.querySelector(".ev").textContent=nv.toLocaleString();upSt()};d.querySelector(".cs").onchange=upd;d.querySelector(".rs").onchange=upd}d.querySelector(".del").onclick=()=>{d.remove();upSt()};$("rh").prepend(d);upSt();};$("calc").onclick=()=>{if(Date.now()<calcLockedUntil)return;if($("calc").disabled)return;cnt++;let now=T?(Date.now()-st)/1e3:ps;let lap=T?(now-lm):null;let c=parseInt($("cn").value),res=exp(c),pl=parseInt($("pb").value)||0;if(pl>0){if(res.angel>0)addRow(cnt,c,res.angel,"angel",now,lap,!1,res.angel);let accRaw=0;document.querySelectorAll('.h[data-type="pass"]').forEach(i=>{let r=parseFloat(i.dataset.rawValCapped);if(!isNaN(r))accRaw+=r;});let remRaw=Math.max(0,pl-(accRaw-passOff));let rem=Math.ceil(remRaw);if(rem>=res.common){addRow(cnt,c,res.common,"pass",now,lap,!0,res.common);}else if(rem>0){addRow(cnt,c,res.common-rem,"overflow",now,lap,!1,res.common-rem);addRow(cnt,c,rem,"pass",now,lap,!0,rem);}else{addRow(cnt,c,res.common,"overflow",now,lap,!0,res.common);}}else{addRow(cnt,c,res.total,"normal",now,lap,!0,res.total);}lm=now;upT(now);calcLockedUntil=Date.now()+3000;let btn=$("calc");btn.disabled=true;btn.style.opacity="0.5";let cb=3,iv=setInterval(()=>{--cb>0?btn.textContent=`(${cb})`:(clearInterval(iv),btn.disabled=false,btn.style.opacity="1",btn.textContent="加算",upUI())},1e3)};$("ra").onclick=()=>{if(T){clearInterval(T);T=null}ps=0;st=0;lm=0;cnt=0;jobOff=0;passOff=0;$("rh").innerHTML="";upT(0);upSt();upUI()};$("ml").onclick=()=>{passOff+=LV;upSt()};$("lp").onclick=()=>{let now=T?(Date.now()-st)/1e3:ps;addRow("LAP",0,0,"lap_only",now,now-lm);lm=now;upT(now)};$("job").onclick=()=>{if(!T&&ps===0)return;let now=T?(Date.now()-st)/1e3:ps;jobOff+=20;if(jobOff>now)jobOff=now;upT(now);if(T){addRow("JOB",0,0,"job",now,now-lm);lm=now;}};$("pob").onclick=()=>{$("cn").value=Math.min(12,opt+1);upUI(false)};$("ts").onclick=()=>{if(!T){st=Date.now()-ps*1e3;T=setInterval(()=>upT((Date.now()-st)/1e3),30);calcLockedUntil=Math.max(calcLockedUntil,Date.now())+100;$("calc").disabled=true;$("calc").style.opacity="0.5";setTimeout(()=>{if(Date.now()>=calcLockedUntil){$("calc").disabled=false;$("calc").style.opacity="1";}},100);}};$("tsp").onclick=()=>{if(T){clearInterval(T);T=null;ps=(Date.now()-st)/1e3;upT(ps)}};$("pr").onclick=()=>{let accRaw=0;document.querySelectorAll('.h[data-type="pass"]').forEach(i=>{let r=parseFloat(i.dataset.rawValCapped);if(!isNaN(r))accRaw+=r;});passOff=Math.ceil(accRaw);upSt();};document.querySelectorAll('input[name="e"],#fd,#tr,#ag,#em,#ms,#pb').forEach(i=>i.onchange=()=>upUI(true));$("cn").onchange=()=>upUI(false);upUI(true);})();
