<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ユッフィーのDQXツールラボ</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#0066cc">
    <link rel="apple-touch-icon" href="./icons/icon-maskable-192.png">
    <link rel="stylesheet" href="launcher.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0 !important;
            padding: 20px 0 0 0 !important;
            background: #eef2f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body.dark-mode {
            background: #0f172a;
            padding: 20px 0 0 0 !important;
        }
        #dqx-app {
            max-width: 950px;
            margin: 0 auto;
            width: 100%;
            padding: 0 16px;
        }
        #dqx-app > div:first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
        #dqx-tool-container {
            margin-top: 24px !important;
            padding-bottom: 100px !important;
        }
        @media (max-width: 768px) {
            body {
                padding: 12px 0 0 0 !important;
            }
            #dqx-app {
                padding: 0 8px;
            }
            #dqx-tool-container {
                margin-top: 16px !important;
                padding-bottom: 120px !important;
            }
        }
        /* トースト通知 */
        #dqx-update-toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%) translateY(120%);
            max-width: 92vw;
            width: 380px;
            background: #223a70;
            color: #fff;
            border-radius: 14px;
            padding: 12px 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            z-index: 10500;
            font-size: 13px;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            transition: transform 0.3s ease;
            pointer-events: none;
        }
        #dqx-update-toast.show {
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        #dqx-update-toast .dqx-toast-icon {
            font-size: 18px;
            flex-shrink: 0;
        }
        #dqx-update-toast .dqx-toast-body {
            flex: 1;
        }
        #dqx-update-toast .dqx-toast-close {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            cursor: pointer;
            font-size: 13px;
            line-height: 1;
        }
        #dqx-update-toast .dqx-toast-close:hover {
            background: rgba(255,255,255,0.3);
        }
        #dqx-update-toast.dqx-toast-success {
            background: #0a6e4f;
        }
        body.dark-mode #dqx-update-toast {
            background: #1e293b;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        @media (max-width: 768px) {
            #dqx-update-toast {
                bottom: 130px;
                width: 92vw;
            }
        }
    </style>
    <script>
        window.HTML_VERSION = '1.2.1β+';

        window.RELOAD_KEY  = 'dqx_reload_count';
        window.MAX_RELOAD  = 2;

        // ========== Pull to Refresh 禁止 ==========
        document.addEventListener('DOMContentLoaded', function() {
            let touchStartY = 0;
            document.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: false });
            document.addEventListener('touchmove', (e) => {
                const touchY = e.touches[0].clientY;
                if (touchY > touchStartY && window.scrollY === 0) {
                    e.preventDefault();
                }
            }, { passive: false });
        });

        async function clearDqxCachesAndReload() {
            if ('caches' in window) {
                try {
                    const cacheNames = await caches.keys();
                    await Promise.all(
                        cacheNames
                            .filter((name) => name.startsWith('dqx-tools-'))
                            .map((name) => caches.delete(name))
                    );
                } catch (e) {
                    console.warn('[Cache Cleanup] failed to delete caches', e);
                }
            }
            if ('serviceWorker' in navigator) {
                try {
                    const reg = await navigator.serviceWorker.getRegistration();
                    if (reg) await reg.update();
                } catch (e) {
                    console.warn('[SW] update failed', e);
                }
            }
            location.reload();
        }

        // launcher-ready 受信時にバージョン整合性を確認し、不一致なら再読み込みする
        function checkVersionAndReload() {
            if (typeof window.LAUNCHER_VERSION === 'undefined') return;
            if (window.LAUNCHER_VERSION === window.HTML_VERSION) {
                sessionStorage.removeItem(window.RELOAD_KEY);
                return;
            }
            const reloadCount = parseInt(sessionStorage.getItem(window.RELOAD_KEY)) || 0;
            if (reloadCount < window.MAX_RELOAD) {
                sessionStorage.setItem(window.RELOAD_KEY, reloadCount + 1);
                window.dqxShowToast(
                    `バージョン情報が一致しません。再読み込みします。（${reloadCount + 1}/${window.MAX_RELOAD}）`,
                    { duration: 2500 }
                );
                setTimeout(() => clearDqxCachesAndReload(), 2600);
            } else {
                sessionStorage.removeItem(window.RELOAD_KEY);
                window.dqxShowToast(
                    'バージョンが一致しません。旧バージョンで起動します。\n時間をおいて再読み込みしてください。',
                    { duration: 8000 }
                );
                console.warn(
                    `Version mismatch: LAUNCHER=${window.LAUNCHER_VERSION}, HTML=${window.HTML_VERSION} - 上限に達したため継続`
                );
            }
        }

        // ========== トースト通知 ==========
        // alert/confirm は PWA standalone で動作しない環境があるため自前実装
        window.dqxShowToast = function(message, opts) {
            opts = opts || {};
            const duration = opts.duration || 5000;
            const variant  = opts.variant  || 'info';

            let toast = document.getElementById('dqx-update-toast');
            if (toast) toast.remove();

            toast = document.createElement('div');
            toast.id = 'dqx-update-toast';
            if (variant === 'success') toast.classList.add('dqx-toast-success');

            const icon  = document.createElement('span');
            icon.className = 'dqx-toast-icon';
            icon.textContent = variant === 'success' ? '✅' : 'ℹ️';

            const body  = document.createElement('span');
            body.className = 'dqx-toast-body';
            body.textContent = message;   // textContent でXSS防止

            const close = document.createElement('button');
            close.className = 'dqx-toast-close';
            close.setAttribute('aria-label', '閉じる');
            close.textContent = '✕';

            toast.appendChild(icon);
            toast.appendChild(body);
            toast.appendChild(close);
            document.body.appendChild(toast);

            requestAnimationFrame(() => toast.classList.add('show'));

            const hide = () => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 320);
            };
            close.onclick = hide;
            if (duration > 0) setTimeout(hide, duration);
        };

        // ========== ネットワーク状態インジケーター ==========
        window.DQX_LAST_MANIFEST_CHECK = null;
        window.DQX_LAST_MANIFEST_OK    = null;
        window.DQX_NET_STATE = 'checking';

        window.dqxUpdateNetIndicator = function() {
            const dot     = document.getElementById('dqx-net-status');
            const popover = document.getElementById('dqx-net-popover');
            if (!dot) return;

            const state = window.DQX_NET_STATE;
            const icon  = { checking: '⏳', latest: '🟢', update: '🔵', offline: '🟠' }[state] || '⏳';

            dot.textContent = icon;
            dot.className   = 'dqx-net-dot';
            dot.classList.add(`dqx-net-${state}`);

            if (popover) {
                const lastCheck = window.DQX_LAST_MANIFEST_CHECK
                    ? window.DQX_LAST_MANIFEST_CHECK.toLocaleTimeString('ja-JP')
                    : '未確認';
                const statusText = {
                    checking: '⏳ 確認中…',
                    latest:   '🟢 最新',
                    update:   '🔵 更新があります（再読み込みで適用）',
                    offline:  '🟠 オフラインのため取得不可'
                }[state] || '⏳ 確認中…';

                // popover は内部管理データのみで構成され、外部入力を含まない
                popover.innerHTML = `
                    <div class="dqx-net-row"><span class="dqx-net-label">接続</span><span>${navigator.onLine ? 'オンライン' : 'オフライン'}</span></div>
                    <div class="dqx-net-row"><span class="dqx-net-label">バージョン</span><span>${statusText}</span></div>
                    <div class="dqx-net-row"><span class="dqx-net-label">確認時刻</span><span>${lastCheck}</span></div>
                    ${state === 'update' ? '<div style="margin-top:8px;"><button id="dqx-reload-btn" style="width:100%;padding:6px;background:#0066cc;color:white;border:none;border-radius:8px;cursor:pointer;font-size:12px;">今すぐ更新</button></div>' : ''}
                `;
                const reloadBtn = document.getElementById('dqx-reload-btn');
                if (reloadBtn) reloadBtn.onclick = () => location.reload(true);
            }
        };

        // ========== バージョン文字列比較ユーティリティ ==========
        // index.html と settings.js の両方から参照できるよう window に公開する
        window.dqxCompareVersions = function(a, b) {
            if (a === b) return 0;
            const parseNums = (v) => (v || '')
                .split(/[^0-9]+/)
                .filter(Boolean)
                .map((n) => parseInt(n, 10));
            const aNums = parseNums(a);
            const bNums = parseNums(b);
            const len   = Math.max(aNums.length, bNums.length);
            for (let i = 0; i < len; i++) {
                const na = aNums[i] || 0;
                const nb = bNums[i] || 0;
                if (na !== nb) return na > nb ? 1 : -1;
            }
            return a.length - b.length;
        };

        // ========== マニフェストバージョン管理 ==========
        function getStoredManifestVersion()       { return localStorage.getItem('dqx_manifest_version'); }
        function setStoredManifestVersion(version) {
            if (version) localStorage.setItem('dqx_manifest_version', version);
        }

        // ========== バージョン確認（起動時・ツール遷移時に呼ぶ） ==========
        window.dqxCheckVersion = function() {
            if (!navigator.onLine) {
                window.DQX_NET_STATE = 'offline';
                window.dqxUpdateNetIndicator();
                return Promise.resolve(null);
            }
            if (window.DQX_NET_STATE === 'update') return Promise.resolve(null);

            window.DQX_NET_STATE = 'checking';
            window.dqxUpdateNetIndicator();

            return fetch('./tools-manifest.json?v=' + Date.now(), { cache: 'no-store' })
                .then((res) => { if (!res.ok) throw new Error(res.status); return res.json(); })
                .then((data) => {
                    window.DQX_LAST_MANIFEST_CHECK = new Date();
                    window.DQX_LAST_MANIFEST_OK    = true;
                    const remoteVer    = data && data.launcherVersion;
                    const storedVer    = getStoredManifestVersion();
                    const cmp = (remoteVer && storedVer)
                        ? window.dqxCompareVersions(remoteVer, storedVer)
                        : 0;
                    window.DQX_NET_STATE = cmp > 0 ? 'update' : 'latest';
                    if (cmp <= 0) setStoredManifestVersion(remoteVer);
                    window.dqxUpdateNetIndicator();
                    return data;
                })
                .catch(() => {
                    window.DQX_LAST_MANIFEST_CHECK = new Date();
                    window.DQX_LAST_MANIFEST_OK    = false;
                    window.DQX_NET_STATE = 'offline';
                    window.dqxUpdateNetIndicator();
                    return null;
                });
        };

        // launcher-ready 受信 → バージョン整合性チェック（1箇所に統合）
        window.addEventListener('launcher-ready', function() {
            checkVersionAndReload();
            window.dqxCheckVersion();
        });

        window.addEventListener('online',  () => window.dqxCheckVersion());
        window.addEventListener('offline', () => {
            window.DQX_NET_STATE = 'offline';
            window.dqxUpdateNetIndicator();
        });

        // ========== Service Worker 登録 ==========
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('[SW] registered:', reg.scope))
                    .catch((e)  => console.warn('[SW] registration failed:', e));
            });
        }

        // ========== 起動時バージョン確認 ==========
        // 起動のたびに localStorage のマニフェストバージョンをリセットすると
        // 比較基準が失われるため、ここでは削除しない。
        // 古いキャッシュは dqxCheckVersion() が fetch した結果で自然に上書きされる。
        window.DQX_REMOTE_MANIFEST        = null;
        window.DQX_MANIFEST_FETCH_PROMISE = window.dqxCheckVersion()
            .then((data) => {
                if (data) {
                    window.DQX_REMOTE_MANIFEST = data;
                } else if (!navigator.onLine) {
                    document.addEventListener('DOMContentLoaded', function() {
                        setTimeout(() => {
                            window.dqxShowToast(
                                'オフラインのため最新情報を確認できませんでした。保存済みのデータで起動しています。'
                            );
                        }, 600);
                    });
                }
                return data;
            });

        // ========== メンテナンスモード ==========
        const START_DATE = new Date('2026-05-21T12:30:00');
        const END_DATE   = new Date('2026-05-21T16:00:00');
        const MAINTENANCE_MODE = (new Date() >= START_DATE && new Date() <= END_DATE);
        const skipMaintenance  = localStorage.getItem('dqx_dev_mode') === 'true';

        if (MAINTENANCE_MODE && !skipMaintenance) {
            document.addEventListener('DOMContentLoaded', function() {
                const overlay = document.createElement('div');
                overlay.className = 'maintenance-overlay';
                overlay.innerHTML = '<div class="maintenance-text">メンテナンス中<br>12:30〜16:00</div>';
                document.body.appendChild(overlay);
            });
        }
    </script>
</head>
<body>
<div id="dqx-app"></div>
<script src="./launcher.js"></script>
<script>
// ========== ツール登録（tools-manifest.json と連携） ==========
// オフライン / 取得失敗時に使用するフォールバック定義
const FALLBACK_TOOLS = [
    { id: 'Checker',  name: '進捗チェッカー',        icon: '📋', desc: '日課・週課・隔週・月課',              url: './tools/checker.js',          renderFn: 'Checker.render' },
    { id: 'exp-m',    name: '傭兵ログトラッカー',              icon: '⚔️', desc: '経験値計算<br>タイマー', url: './tools/expmercenary.js',      renderFn: 'Expmercenary.render' },
    { id: 'versions', name: '傭兵ログトラッカー<br>旧ver',     icon: '📜', desc: '旧verセレクタ',          url: './tools/version_selector.js',  renderFn: 'VersionSelector.render' },
    { id: 'help',     name: '取扱説明書',                      icon: '📖', desc: '使い方<br>Q&A',          url: './tools/help.js',              renderFn: 'Help.render' },
    { id: 'settings', name: '設定',                            icon: '⚙️', desc: 'キャッシュ<br>フィードバック', url: './tools/settings.js',     renderFn: 'Settings.render' },
    { id: 'install',  name: 'アプリの<br>使い方',              icon: '📲', desc: 'ホーム画面に<br>追加する方法', url: './tools/install.js',      renderFn: 'Install.render', hideInMenu: true }
];

function registerAllTools(manifestData) {
    const toolList = (manifestData && Array.isArray(manifestData.tools) && manifestData.tools.length > 0)
        ? manifestData.tools
        : FALLBACK_TOOLS;
    const testToolList = (manifestData && Array.isArray(manifestData.testTools) && manifestData.testTools.length > 0)
        ? manifestData.testTools
        : [];

    // 新規ツール通知用：登録前の既知IDを取得
    const knownIdsRaw = localStorage.getItem('dqx_known_tool_ids');
    const knownIds    = knownIdsRaw ? JSON.parse(knownIdsRaw) : null;
    const currentIds  = toolList.map((t) => t.id);

    toolList.forEach((tool) => {
        DQXTools.register(tool.id, {
            name:       tool.name,
            icon:       tool.icon,
            desc:       tool.desc,
            url:        tool.url,
            renderFn:   tool.renderFn,
            hideInMenu: !!tool.hideInMenu
        });
    });

    // テストツールはカード表示のみ（ツールバー非表示）
    testToolList.forEach((tool) => {
        DQXTools.register(`test_${tool.file}`, {
            name:           `${tool.name} 🔒`,
            icon:           tool.icon,
            desc:           'API認証',
            url:            '',
            renderFn:       '',
            hideInMenu:     true,
            requiresToken:  true,
            testToolConfig: { filename: tool.file, globalName: tool.globalName }
        });
    });

    DQXTools.init('dqx-app');

    // 初回起動（knownIds === null）は通知しない
    if (knownIds !== null) {
        const newIds = currentIds.filter((id) => !knownIds.includes(id));
        if (newIds.length > 0) {
            const newNames = toolList
                .filter((t) => newIds.includes(t.id))
                .map((t) => t.name.replace(/<br>/g, ''))
                .join('、');
            setTimeout(() => {
                window.dqxShowToast(`新しいツールが追加されました：${newNames}`, { variant: 'success', duration: 7000 });
            }, 800);
        }
    }
    localStorage.setItem('dqx_known_tool_ids', JSON.stringify(currentIds));
}

window.addEventListener('load', function() {
    window.DQX_MANIFEST_FETCH_PROMISE
        .then((data) => registerAllTools(data))
        .catch(()    => registerAllTools(null));
});
</script>
<!-- デバッグツール（?debug=1 または ?eruda で有効） -->
<script>
(function() {
    const params      = new URLSearchParams(window.location.search);
    const enableDebug = params.has('debug') || params.has('eruda');
    if (!enableDebug) return;
    const script    = document.createElement('script');
    script.src      = 'https://cdn.jsdelivr.net/npm/eruda';
    script.onload   = function() {
        eruda.init();
        console.log('デバッグモード有効 - 幅:', window.innerWidth);
    };
    document.head.appendChild(script);
})();
</script>
</body>
</html>
